<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>読んでいる本</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Meiryo", sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 16px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        #sincelastupdate {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 16px;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        @media (max-width: 1023px) {
            .book-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 639px) {
            .book-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .book-card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            display: none;
            padding: 12px;
        }

        .book-card.loaded {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .book-title {
            font-size: 0.85rem;
            line-height: 1.5;
            font-weight: bold;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-author {
            font-size: 0.75rem;
            color: #555;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-isbn {
            font-size: 0.7rem;
            color: #999;
            margin-top: auto;
            padding-top: 4px;
            border-top: 1px solid #eee;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>読んでいる本</h1>
        <p id="sincelastupdate"></p>

        <div class="book-grid" id="book-grid"></div>
    </div>

    <script>
        function createCard(index, isbn) {
            var card = $('<div class="book-card" id="card' + index + '"></div>');
            card.append('<p class="book-title" id="title' + index + '"></p>');
            card.append('<p class="book-author" id="author' + index + '"></p>');
            card.append('<p class="book-isbn">ISBN: ' + isbn + '</p>');
            $("#book-grid").append(card);
        }

        function loadBook(isbn, index) {
            if (!isbn) return;
            $.getJSON("https://api.openbd.jp/v1/get?isbn=" + isbn, function(data) {
                var title = "（タイトル不明）";
                var author = "";
                if (data && data[0] != null) {
                    title = data[0].summary.title || title;
                    author = data[0].summary.author || "";
                }
                $("#title" + index).text(title);
                $("#author" + index).text(author);
                $("#card" + index).addClass("loaded");
            }).fail(function() {
                $("#title" + index).text("（タイトル不明）");
                $("#card" + index).addClass("loaded");
            });
        }

        $(function() {
            $.getJSON("https://my-app.kuga00.workers.dev/", function(data) {
                if (!data || data[0] == null) {
                    alert("データが見つかりません");
                    return;
                }
                var d = data[0];
                $("#sincelastupdate").text(d.since_last_update);

                for (var i = 1; i <= 10; i++) {
                    var isbn = d["isbn_" + i];
                    if (isbn) {
                        createCard(i, isbn);
                        loadBook(isbn, i);
                    }
                }
            });
        });
    </script>

</body>
</html>
