<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>読んでいる本</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Meiryo", sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 16px;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        #sincelastupdate {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 16px;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        @media (max-width: 400px) {
            .book-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .book-card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            display: none;
        }

        .book-card.loaded {
            display: block;
        }

        .book-card img {
            width: 100%;
            aspect-ratio: 100 / 142;
            object-fit: cover;
            display: block;
            border-bottom: 1px solid #eee;
        }

        .book-title {
            font-size: 0.75rem;
            padding: 6px 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

    </style>
</head>
<body>

    <h1>読んでいる本</h1>
    <p id="sincelastupdate"></p>

    <div class="book-grid" id="book-grid"></div>

    <script>
        var NO_IMAGE = "no_image.jpg";

        function createCard(index) {
            var card = $('<div class="book-card" id="card' + index + '"></div>');
            card.append('<img id="img' + index + '" src="" alt="">');
            card.append('<p class="book-title" id="title' + index + '"></p>');
            $("#book-grid").append(card);
        }

        function loadBook(isbn, index) {
            if (!isbn) return;
            $.getJSON("https://api.openbd.jp/v1/get?isbn=" + isbn, function(data) {
                if (!data || data[0] == null) return;
                var cover = data[0].summary.cover || NO_IMAGE;
                var title = data[0].summary.title || "（タイトル不明）";
                $("#img" + index).attr("src", cover).attr("alt", title);
                $("#title" + index).text(title);
                $("#card" + index).addClass("loaded");
            });
        }

        $(function() {
            for (var i = 1; i <= 10; i++) createCard(i);

            $.getJSON("https://my-app.kuga00.workers.dev/", function(data) {
                if (!data || data[0] == null) {
                    alert("データが見つかりません");
                    return;
                }
                var d = data[0];
                $("#sincelastupdate").text(d.since_last_update);

                // コールバック内でISBNが揃ってから書籍を取得
                loadBook(d.isbn_1,  1);
                loadBook(d.isbn_2,  2);
                loadBook(d.isbn_3,  3);
                loadBook(d.isbn_4,  4);
                loadBook(d.isbn_5,  5);
                loadBook(d.isbn_6,  6);
                loadBook(d.isbn_7,  7);
                loadBook(d.isbn_8,  8);
                loadBook(d.isbn_9,  9);
                loadBook(d.isbn_10, 10);
            });
        });
    </script>

</body>
</html>
